on:
  push:
    branches:
      - master 

name: Render and Deploy Documentation

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build: 
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-plain-generic \
            lmodern \
            curl

      - name: Install Quarto
        run: |
          QUARTO_VERSION="1.4.550"
          curl -LO https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.deb
          sudo dpkg -i quarto-${QUARTO_VERSION}-linux-amd64.deb

      - name: Render Quarto
        run: |
          quarto render arma3-linux-guide.qmd --output-dir public

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tell the action exactly where the files are
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4